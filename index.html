        ]);

        const videoRef = useRef(null);

        useEffect(() => {
          // Camera feed simulator
          if (videoOn && videoRef.current) {
            navigator.mediaDevices.getUserMedia({ video: true, audio: false })
              .then(stream => { if (videoRef.current) videoRef.current.srcObject = stream; })
              .catch(err => console.log('Camera real inacessível, usando backup decorativo.'));
          }

          // Speak simulator
          const interval = setInterval(() => {
            setParticipants(prev => prev.map(p => ({
              ...p,
              speaking: p.active && Math.random() > 0.6
            })));
          }, 2000);
          return () => clearInterval(interval);
        }, []);

          e.preventDefault();
          if (!chatInput.trim()) return;
          const now = new Date();
          const timeStr = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;

      function PortfolioFeed({ currentUser }) {

        const handleImageUpload = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onloadend = () => setMediaBase64(reader.result);
          reader.readAsDataURL(file);
        };

        const createPortfolio = (e) => {
          e.preventDefault();
          if (!title || !desc) return;
          const newItem = {
            id: 'port_' + Date.now(),
            studentId: currentUser.id,
            studentName: currentUser.name,

            date: new Date().toISOString(),
            comments: []
          };
          const updated = [newItem, ...feed];
          setFeed(updated);
          db.set('se_portfolios', updated);
          setTitle('');
          setDesc('');
          setMediaBase64('');
          setShowAddFeed(false);

          const updated = feed.map(item => {
            if (item.id === id) {

                      <div className="flex items-center gap-4 pt-3 border-t border-slate-100">

                </div>
              </div>

            {showAddFeed && (
              <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">

          color: 'indigo',
          expression: 'happy',
          accessory: 'none',
          background: 'solid'
        });

        // Floating points animation helper
        const [floatingStars, setFloatingStars] = useState([]);

        useEffect(() => {
          const storedStudents = db.get('se_users', INITIAL_USERS).filter(u => u.role === 'student');
          setStudents(storedStudents);
          setPointsLog(db.get('se_points', []));
          
          if (currentUser.role === 'student') {
            const currentMascot = db.get(`mascot_${currentUser.id}`, { color: 'indigo', expression: 'happy', accessory: 'none', background: 'solid' });
            setAvatarConfig(currentMascot);
          }
        }, [currentUser]);

        const givePoints = (student, comp) => {
          const allUsers = db.get('se_users', INITIAL_USERS);
          const pointsToAdd = comp.points;

          // Update user points
          const updatedUsers = allUsers.map(u => {
            if (u.id === student.id) {
              const currentPoints = u.points || 0;
              const nextPoints = Math.max(0, currentPoints + pointsToAdd);
              
              // Trigger floating indicator
              const id = Date.now();
              setFloatingStars(prev => [...prev, { id, points: pointsToAdd, x: Math.random() * 80 + 10 }]);
              setTimeout(() => {
                setFloatingStars(prev => prev.filter(f => f.id !== id));
              }, 1200);

              return { ...u, points: nextPoints };
            }
            return u;
          });

          db.set('se_users', updatedUsers);
          const updatedStudents = updatedUsers.filter(u => u.role === 'student');
          setStudents(updatedStudents);

          // Find updated student and set selection
          const currentSelect = updatedStudents.find(s => s.id === student.id);
          setSelectedStudent(currentSelect);

          // Update Points Transaction Log
          const logEntry = {
            id: 'pt_' + Date.now(),
            studentName: student.name,
            points: pointsToAdd,
            category: comp.name,
            date: new Date().toISOString()
          };
          const updatedLog = [logEntry, ...pointsLog];
          setPointsLog(updatedLog);
          db.set('se_points', updatedLog);
        };

          db.set(`mascot_${currentUser.id}`, avatarConfig);
          alert('Mascote salvo com sucesso no navegador!');
        };

                      className="w-full text-xs bg-slate-50 border border-slate-100 rounded-xl pl-9 pr-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-[#7A3BF4]/10 text-slate-800"
                    />
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <Icon name="search" className="h-4 w-4 text-slate-400" />
                    </div>
                  </div>
                </div>

                <div className="flex-1 overflow-y-auto divide-y divide-slate-50">
                  {filteredContacts.map(c => {
                    const isSelected = selectedContact.id === c.id;
                    return (
                      <button 
                        key={c.id} 
                        onClick={() => handleSelect(c)}
                        className={`w-full flex items-center gap-3 p-4 text-left transition-all ${
                          isSelected ? 'bg-indigo-50/40 border-l-4 border-l-[#7A3BF4]' : 'hover:bg-slate-50'
                        }`}
                      >
                        <div className="relative shrink-0">
                          <img src={c.avatar} className="w-10 h-10 rounded-full object-cover" />

                            <span className="absolute bottom-0 right-0 w-2.5 h-2.5 bg-emerald-500 rounded-full border-2 border-white"></span>
                          )}
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="flex justify-between items-baseline">
                            <h4 className="text-xs font-extrabold text-slate-900 truncate">{c.name.split(' ')[0] + ' ' + (c.name.split(' ')[1] || '')}</h4>
                            <span className="text-[9px] text-slate-400 font-bold shrink-0">11:02</span>
                          </div>
                          <p className="text-[10px] text-slate-500 mt-1 truncate font-medium">{c.lastMsg}</p>
                        </div>
                        {c.unread && (
                          <div className="w-2 h-2 bg-[#7A3BF4] rounded-full shrink-0"></div>
                        )}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Right area: active conversation */}
              <div className="flex-1 flex flex-col justify-between bg-slate-50/20">
                {/* Header */}
                <div className="p-4 bg-white border-b border-slate-100 flex justify-between items-center shrink-0">
                  <div className="flex items-center gap-3">
                    <div className="relative shrink-0">
                      <img src={selectedContact.avatar} className="w-10 h-10 rounded-full object-cover" />
                      {selectedContact.online && (
                        <span className="absolute bottom-0 right-0 w-2.5 h-2.5 bg-emerald-500 rounded-full border-2 border-white"></span>
                      )}
                    </div>
                    <div>
                      <h4 className="text-xs font-black text-slate-900 leading-tight">{selectedContact.name}</h4>
                      <p className="text-[9px] text-slate-400 font-bold mt-0.5">
                        {selectedContact.online ? 'Disponível' : 'Offline'} • {selectedContact.role === 'parent' ? 'Responsável' : 'Professora'}
                      </p>
                    </div>
                  </div>
                  <div className="flex gap-2">
                    <button className="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-50 rounded-xl transition-all"><Icon name="phoneOff" className="h-4 w-4 rotate-135 text-slate-400" /></button>
                    <button className="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-50 rounded-xl transition-all"><Icon name="video" className="h-4 w-4 text-slate-400" /></button>
                  </div>
                </div>

                {/* Messages feed */}
                <div className="flex-1 overflow-y-auto p-4 space-y-4">
                  {(messageHistory[selectedContact.id] || []).map(msg => {
                    const isMe = msg.sender === 'teacher';
                    return (
                      <div key={msg.id} className={`flex ${isMe ? 'justify-end' : 'justify-start'}`}>
                        <div className={`max-w-md rounded-2xl px-4 py-2.5 text-xs shadow-xs border ${
                          isMe 
                            ? 'bg-[#7A3BF4] text-white border-[#7A3BF4] rounded-tr-none' 
                            : 'bg-white text-slate-800 border-slate-100 rounded-tl-none'
                        }`}>
                          <p className="leading-relaxed font-medium">{msg.text}</p>
                          <p className={`text-[8px] text-right mt-1 font-bold ${isMe ? 'text-white/70' : 'text-slate-400'}`}>{msg.time}</p>
                        </div>
                      </div>
                    );
                  })}
                  {isTyping && (
                    <div className="flex justify-start">
                      <div className="bg-white border border-slate-100 rounded-2xl rounded-tl-none px-4 py-3 text-xs shadow-xs text-slate-400 flex items-center gap-1">
                        <span className="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style={{ animationDelay: '0ms' }}></span>
                        <span className="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style={{ animationDelay: '150ms' }}></span>
                        <span className="w-1.5 h-1.5 bg-slate-400 rounded-full animate-bounce" style={{ animationDelay: '300ms' }}></span>
                      </div>
                    </div>
                  )}
                </div>

                {/* Input field */}
                <form onSubmit={handleSend} className="p-4 bg-white border-t border-slate-100 flex gap-2 shrink-0">
                  <input 
                    type="text" 
                    placeholder={`Escrever mensagem para ${selectedContact.name.split(' ')[0]}...`}
                    value={typedMessage}
                    onChange={e => setTypedMessage(e.target.value)}
                    className="flex-1 text-xs bg-slate-50 border border-slate-100 rounded-2xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#7A3BF4]/10 text-slate-800"
                  />
                  <button type="submit" className="p-3 bg-[#7A3BF4] hover:bg-[#6830D5] text-white rounded-2xl shadow-sm transition-all flex items-center justify-center shrink-0">
                    <Icon name="send" className="h-4 w-4" />
                  </button>
                </form>
              </div>
            </div>
          </div>
        );
      }

      // ----------------------------------------
      // DIRECTORY TAB (SCHOOL COMMUNITY MEMBERS)
      // ----------------------------------------
      function DiretorioTab({ currentUser }) {
        const [users, setUsers] = useState([]);
        const [search, setSearch] = useState('');
        const [filterRole, setFilterRole] = useState('all');
        const [showAddModal, setShowAddModal] = useState(false);
        const [newMember, setNewMember] = useState({ name: '', email: '', role: 'student', grade: '' });

        useEffect(() => {
          setUsers(db.get('se_users', INITIAL_USERS));
        }, []);

        const handleAddMember = (e) => {
          e.preventDefault();
          if (!newMember.name || !newMember.email) return;

          const created = {
            id: 'usr_' + Date.now(),
            ...newMember,
            verified: true,
            avatarUrl: `https://images.unsplash.com/photo-${newMember.role === 'teacher' ? '1544005313-94ddf0286df2' : '1535713875002-d1d0cf377fde'}?auto=format&fit=crop&q=80&w=200`
          };

          const updated = [...users, created];
          setUsers(updated);
          db.set('se_users', updated);
          setNewMember({ name: '', email: '', role: 'student', grade: '' });
          setShowAddModal(false);
        };

        const filtered = users.filter(u => {
          const matchesSearch = u.name.toLowerCase().includes(search.toLowerCase()) || u.email.toLowerCase().includes(search.toLowerCase());
          const matchesRole = filterRole === 'all' || u.role === filterRole;
          return matchesSearch && matchesRole;
        });

        const getRoleBadge = (role) => {
          switch (role) {
            case 'teacher': return 'bg-blue-100 text-blue-800 border-blue-200';
            case 'student': return 'bg-emerald-100 text-emerald-800 border-emerald-200';
            case 'parent': return 'bg-purple-100 text-purple-800 border-purple-200';
            case 'admin': return 'bg-amber-100 text-amber-800 border-amber-200';
          }
        };

        const getRoleLabel = (role) => {
          switch (role) {
            case 'teacher': return 'Professor';
            case 'student': return 'Estudante';
            case 'parent': return 'Responsável';
            case 'admin': return 'Admin';
          }
        };

        return (
          <div className="p-8 space-y-6">
            <div className="flex justify-between items-center">
              <div>
                <h1 className="text-2xl font-black text-slate-900 flex items-center gap-2">
                  <span>📖 Diretório de Membros</span>
                </h1>
                <p className="text-xs text-slate-400 mt-1">Veja e adicione professores, estudantes e responsáveis associados ao Colégio.</p>
              </div>
              {currentUser.role !== 'student' && (
                <button 
                  onClick={() => setShowAddModal(true)} 
                  className="px-4 py-2.5 bg-[#7A3BF4] hover:bg-[#6830D5] text-white text-xs font-bold rounded-xl flex items-center gap-1.5 shadow-md transition-all"
                >
                  <Icon name="plus" className="h-4 w-4" /> Convidar Membro
                </button>
              )}
            </div>

            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-6">
              {/* Filters header */}
              <div className="flex flex-col sm:flex-row gap-4 justify-between items-stretch sm:items-center">
                <div className="relative flex-1 max-w-md">
                  <input 
                    type="text" 
                    placeholder="Filtrar por nome ou e-mail institucional..." 
                    value={search}
                    onChange={e => setSearch(e.target.value)}
                    className="w-full text-xs bg-slate-50 border border-slate-100 rounded-xl pl-9 pr-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-[#7A3BF4]/10 text-slate-800"
                  />
                  <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <Icon name="search" className="h-4 w-4 text-slate-400" />
                  </div>
                </div>

                <div className="flex gap-1.5 overflow-x-auto">
                  {[
                    { id: 'all', label: 'Todos' },
                    { id: 'teacher', label: 'Professores' },
                    { id: 'student', label: 'Estudantes' },
                    { id: 'parent', label: 'Responsáveis' }
                  ].map(tab => (
                    <button 
                      key={tab.id} 
                      onClick={() => setFilterRole(tab.id)}
                      className={`px-3 py-1.5 text-xs font-bold rounded-lg border transition-all ${
                        filterRole === tab.id 
                          ? 'bg-[#7A3BF4]/10 text-[#7A3BF4] border-[#7A3BF4]/20' 
                          : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'
                      }`}
                    >
                      {tab.label}
                    </button>
                  ))}
                </div>
              </div>

              {/* Members grid */}
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {filtered.map(member => (
                  <div key={member.id} className="p-5 rounded-2xl border border-slate-100 hover:border-slate-200 bg-slate-50/10 hover:bg-slate-50/30 flex items-start gap-4 transition-all duration-200 group">
                    <img src={member.avatarUrl} className="w-12 h-12 rounded-xl object-cover shrink-0 border border-slate-100" />
                    <div className="min-w-0 flex-1">
                      <div className="flex items-center gap-1.5">
                        <h4 className="text-sm font-extrabold text-slate-900 truncate group-hover:text-[#7A3BF4] transition-colors">{member.name}</h4>
                        {member.verified && (
                          <span className="text-[10px]" title="Membro Verificado">✅</span>
                        )}
                      </div>
                      <p className="text-[11px] text-slate-400 font-semibold truncate mt-0.5">{member.email}</p>
                      <div className="flex gap-2 items-center mt-2.5">
                        <span className={`text-[9px] font-black uppercase px-2 py-0.5 rounded-md border ${getRoleBadge(member.role)}`}>
                          {getRoleLabel(member.role)}
                        </span>
                        {member.grade && (
                          <span className="text-[9px] font-bold text-slate-500 bg-slate-100 px-2 py-0.5 rounded-md">
                            {member.grade}
                          </span>
                        )}
                        {member.points !== undefined && (
                          <span className="text-[9px] font-black text-amber-600 flex items-center gap-0.5">
                            ⭐ {member.points}
                          </span>
                        )}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Add Member Modal */}
            {showAddModal && (
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-xs flex items-center justify-center z-50 animate-fade-in">
                <div className="bg-white rounded-3xl p-6 w-full max-w-md border border-slate-100 shadow-xl space-y-4">
                  <div className="flex justify-between items-center border-b border-slate-100 pb-3">
                    <h3 className="font-extrabold text-slate-900 text-base">Adicionar Novo Membro</h3>
                    <button onClick={() => setShowAddModal(false)} className="text-slate-400 hover:text-slate-600"><Icon name="x" className="h-5 w-5" /></button>
                  </div>
                  <form onSubmit={handleAddMember} className="space-y-4">
                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase">Nome Completo</label>
                      <input 
                        type="text" 
                        required
                        placeholder="Ex: Carlos de Souza"
                        value={newMember.name}
                        onChange={e => setNewMember({...newMember, name: e.target.value})}
                        className="w-full text-sm px-4 py-2.5 mt-1 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#7A3BF4]/20"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase">E-mail Escolar</label>
                      <input 
                        type="email" 
                        required
                        placeholder="Ex: carlos@escola.edu.br"
                        value={newMember.email}
                        onChange={e => setNewMember({...newMember, email: e.target.value})}
                        className="w-full text-sm px-4 py-2.5 mt-1 border border-slate-200 rounded-xl focus:outline-none"
                      />
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-xs font-bold text-slate-500 uppercase">Função</label>
                        <select 
                          value={newMember.role}
                          onChange={e => setNewMember({...newMember, role: e.target.value})}
                          className="w-full text-sm px-4 py-2.5 mt-1 border border-slate-200 rounded-xl bg-white focus:outline-none"
                        >
                          <option value="student">Estudante</option>
                          <option value="parent">Responsável</option>
                          <option value="teacher">Professor</option>
                          <option value="admin">Administrador</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-slate-500 uppercase">Turma (Opcional)</label>
                        <input 
                          type="text" 
                          placeholder="Ex: 3º Ano B"
                          value={newMember.grade}
                          onChange={e => setNewMember({...newMember, grade: e.target.value})}
                          className="w-full text-sm px-4 py-2.5 mt-1 border border-slate-200 rounded-xl focus:outline-none"
                        />
                      </div>
                    </div>
                    <button type="submit" className="w-full py-3 bg-[#7A3BF4] hover:bg-[#6830D5] text-white font-extrabold rounded-xl text-sm shadow-md transition-all">
                      Adicionar Membro
                    </button>
                  </form>
                </div>
              </div>
            )}
          </div>
        );
      }

      // ----------------------------------------
      // ONBOARDING MODAL (TEACHER VERIFICATION FLOW)
      // ----------------------------------------
      function OnboardingModal({ currentUser, onComplete, onClose }) {
        const [step, setStep] = useState(1);
        const [fullName, setFullName] = useState(currentUser.name);
        const [email, setEmail] = useState(currentUser.email);
        const [subjects, setSubjects] = useState({
          math: true,
          science: false,
          portuguese: false,
          history: false
        });
        const [file, setFile] = useState(null);
        const [uploadProgress, setUploadProgress] = useState(0);

        const handleUpload = () => {
          let progress = 0;
          const interval = setInterval(() => {
            progress += 10;
            setUploadProgress(progress);
            if (progress >= 100) {
              clearInterval(interval);
            }
          }, 100);
        };

        const handleComplete = () => {
          onComplete(fullName);
        };

        return (
          <div className="fixed inset-0 bg-slate-900/75 backdrop-blur-xs flex items-center justify-center z-50 animate-fade-in p-4">
            <div className="bg-white rounded-[32px] w-full max-w-xl border border-slate-100 shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
              {/* Header */}
              <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <div>
                  <h3 className="font-black text-slate-900 text-lg leading-tight">Configurando sua Conta</h3>
                  <p className="text-[11px] font-bold text-slate-400 mt-0.5">Passo {step} de 3</p>
                </div>
                <button onClick={onClose} className="p-2 text-slate-400 hover:text-slate-600 rounded-full hover:bg-slate-100 transition-all">
                  <Icon name="x" className="h-5 w-5" />
                </button>
              </div>

              {/* Progress bar */}
              <div className="w-full h-1.5 bg-slate-100">
                <div 
                  className="h-full bg-[#7A3BF4] transition-all duration-300" 
                  style={{ width: `${(step / 3) * 100}%` }}
                ></div>
              </div>

              {/* Step content */}
              <div className="flex-1 overflow-y-auto p-8 space-y-6">
                {step === 1 && (
                  <div className="space-y-4 animate-fade-in">
                    <div className="text-center max-w-md mx-auto mb-6">
                      <div className="w-14 h-14 bg-purple-50 text-[#7A3BF4] rounded-2xl flex items-center justify-center text-2xl mx-auto mb-4">✍️</div>
                      <h4 className="text-base font-black text-slate-900">Confirme sua Identidade</h4>
                      <p className="text-xs text-slate-500 mt-1 leading-relaxed">Confirme seu nome completo de docente e seu e-mail escolar institucional para que o Colégio Estadual Unidade Polo te identifique.</p>
                    </div>

                    <div className="space-y-3">
                      <div>
                        <label className="block text-xs font-bold text-slate-500 uppercase">Seu Nome Escolar</label>
                        <input 
                          type="text" 
                          required
                          value={fullName}
                          onChange={e => setFullName(e.target.value)}
                          className="w-full text-sm px-4 py-3 mt-1.5 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#7A3BF4]/20 text-slate-800 bg-slate-50/50"
                        />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-slate-500 uppercase">E-mail Escolar Institucional</label>
                        <input 
                          type="email" 
                          disabled
                          value={email}
                          className="w-full text-sm px-4 py-3 mt-1.5 border border-slate-200 rounded-xl bg-slate-100 text-slate-400 cursor-not-allowed"
                        />
                        <p className="text-[10px] text-slate-400 mt-1">E-mail verificado pela instituição de ensino.</p>
                      </div>
                    </div>
                  </div>
                )}

                {step === 2 && (
                  <div className="space-y-4 animate-fade-in">
                    <div className="text-center max-w-md mx-auto mb-6">
                      <div className="w-14 h-14 bg-purple-50 text-[#7A3BF4] rounded-2xl flex items-center justify-center text-2xl mx-auto mb-4">🏫</div>
                      <h4 className="text-base font-black text-slate-900">Escolha suas Disciplinas</h4>
                      <p className="text-xs text-slate-500 mt-1 leading-relaxed">Selecione as disciplinas sob sua responsabilidade no Colégio Estadual Unidade Polo.</p>
                    </div>

                    <div className="grid grid-cols-2 gap-3.5">
                      {[
                        { id: 'math', label: '📐 Matemática' },
                        { id: 'science', label: '🧬 Ciências' },
                        { id: 'portuguese', label: '📖 Língua Portuguesa' },
                        { id: 'history', label: '🧭 Geografia & História' }
                      ].map(sub => (
                        <button 
                          key={sub.id}
                          type="button"
                          onClick={() => setSubjects({ ...subjects, [sub.id]: !subjects[sub.id] })}
                          className={`p-4 rounded-2xl border text-left font-bold text-xs transition-all flex items-center justify-between ${
                            subjects[sub.id] 
                              ? 'bg-[#7A3BF4]/10 border-[#7A3BF4] text-[#7A3BF4]' 
                              : 'bg-white border-slate-200 hover:bg-slate-50 text-slate-600'
                          }`}
                        >
                          <span>{sub.label}</span>
                          <span className={`w-4 h-4 rounded-full border flex items-center justify-center ${
                            subjects[sub.id] ? 'bg-[#7A3BF4] border-[#7A3BF4] text-white' : 'border-slate-300'
                          }`}>
                            {subjects[sub.id] && <Icon name="check" className="h-2.5 w-2.5" />}
                          </span>
                        </button>
                      ))}
                    </div>
                  </div>
                )}

                {step === 3 && (
                  <div className="space-y-4 animate-fade-in">
                    <div className="text-center max-w-md mx-auto mb-6">
                      <div className="w-14 h-14 bg-purple-50 text-[#7A3BF4] rounded-2xl flex items-center justify-center text-2xl mx-auto mb-4">📎</div>
                      <h4 className="text-base font-black text-slate-900">Comprovação Escolar</h4>
                      <p className="text-xs text-slate-500 mt-1 leading-relaxed">Envie uma foto ou arquivo do seu Crachá de Docente, Contrato de Trabalho ou qualquer comprovante que comprove seu cargo na escola.</p>
                    </div>

                    <div 
                      onClick={() => {
                        setFile({ name: 'comprovante_docencia_unidade_polo.pdf', size: '1.4 MB' });
                        handleUpload();
                      }}
                      className="border-2 border-dashed border-slate-200 hover:border-[#7A3BF4]/50 hover:bg-[#7A3BF4]/5 rounded-3xl p-8 text-center cursor-pointer transition-all space-y-3"
                    >
                      <p className="text-3xl mx-auto">📤</p>
                      <div>
                        <p className="text-xs font-bold text-slate-700">Clique para selecionar ou arraste o arquivo aqui</p>
                        <p className="text-[10px] text-slate-400 mt-1">Formatos suportados: JPG, PNG, PDF (Max 10MB)</p>
                      </div>
                    </div>

                    {file && (
                      <div className="bg-slate-50 border border-slate-100 rounded-2xl p-4 flex items-center justify-between">
                        <div className="flex items-center gap-3">
                          <span className="text-2xl">📄</span>
                          <div className="min-w-0">
                            <p className="text-xs font-bold text-slate-800 truncate">{file.name}</p>
                            <p className="text-[10px] text-slate-400 font-bold uppercase">{file.size}</p>
                          </div>
                        </div>
                        {uploadProgress < 100 ? (
                          <span className="text-xs font-extrabold text-indigo-600 animate-pulse-slow">{uploadProgress}%</span>
                        ) : (
                          <span className="text-xs font-extrabold text-emerald-600 flex items-center gap-1">Pronto ✅</span>
                        )}
                      </div>
                    )}
                  </div>
                )}
              </div>

              {/* Footer */}
              <div className="p-6 border-t border-slate-100 bg-slate-50/50 flex justify-between gap-4 shrink-0">
                {step > 1 ? (
                  <button 
                    onClick={() => setStep(step - 1)}
                    className="px-6 py-2.5 border border-slate-200 text-slate-600 font-bold rounded-xl text-xs hover:bg-slate-100 transition-all"
                  >
                    Voltar
                  </button>
                ) : (
                  <div></div>
                )}
                {step < 3 ? (
                  <button 
                    onClick={() => setStep(step + 1)}
                    className="px-6 py-2.5 bg-[#7A3BF4] hover:bg-[#6830D5] text-white font-bold rounded-xl text-xs transition-all shadow-md ml-auto"
                  >
                    Avançar
                  </button>
                ) : (
                  <button 
                    onClick={handleComplete}
                    disabled={!file || uploadProgress < 100}
                    className={`px-8 py-2.5 font-extrabold rounded-xl text-xs transition-all shadow-md ml-auto ${
                      file && uploadProgress >= 100 
                        ? 'bg-[#7A3BF4] hover:bg-[#6830D5] text-white cursor-pointer' 
                        : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                    }`}
                  >
                    Concluir Verificação
                  </button>
                )}
              </div>
            </div>
          </div>
        );
      }

      // ----------------------------------------
      // ROOT SHELL CONTAINER (APP)
      // ----------------------------------------
      function App() {
        const [currentUser, setCurrentUser] = useState(null);
        const [activeRoomCall, setActiveRoomCall] = useState(null);
        const [activeTab, setActiveTab] = useState('rooms');
        const [showOnboarding, setShowOnboarding] = useState(false);

        useEffect(() => {
          // Initialize default db
          if (!localStorage.getItem('se_users')) {
            db.set('se_users', INITIAL_USERS);
          }
          if (!localStorage.getItem('se_rooms')) {
            db.set('se_rooms', INITIAL_ROOMS);
          }
          if (!localStorage.getItem('se_presence')) {
            db.set('se_presence', INITIAL_PRESENCE);
          }
          if (!localStorage.getItem('se_audits')) {
            db.set('se_audits', INITIAL_AUDITS);
          }
        }, []);

        const handleOnboardingComplete = (verifiedName) => {
          const updatedUser = { ...currentUser, name: verifiedName, verified: true };
          setCurrentUser(updatedUser);
          
          const allUsers = db.get('se_users', INITIAL_USERS);
          const updatedList = allUsers.map(u => u.id === currentUser.id ? { ...u, name: verifiedName, verified: true } : u);
          db.set('se_users', updatedList);
          
          setShowOnboarding(false);
        };

        const handleLoginSuccess = (user) => {
          setCurrentUser(user);
          if (user.role === 'admin') {
            setActiveTab('school-stats');
          } else {
            setActiveTab('rooms');
          }
        };

        const handleJoinAsVisitor = (visitorName, targetRoomId) => {
          const visitorUser = {
            id: 'vis_' + Date.now(),
            name: `${visitorName} (Visitante)`,
            email: 'visitante@escola.edu.br',
            role: 'visitor',
            verified: false
          };
          setCurrentUser(visitorUser);
          setActiveTab('rooms');
          
          const defaultRoom = {
            id: targetRoomId,
            name: targetRoomId === 'r2' ? 'Ciências - 1º Ano A' : 'Matemática - 3º Ano B',
            type: 'temporary',
            capacity: 20,
            joinCode: 'VIS',
            description: 'Acesso instantâneo de visitante.',
            subject: 'Geral',
            teacherName: 'Prof. Alexandre Souza'
          };
          setActiveRoomCall(defaultRoom);
        };

        const handleRoleSwitch = (newRole) => {
          if (!currentUser) return;
          const allUsers = db.get('se_users', INITIAL_USERS);
          const found = allUsers.find(u => u.role === newRole);
          if (found) {
            setCurrentUser(found);
          } else {
            const fallback = {
              id: 'tmp_' + Date.now(),
              name: `Simulação ${newRole}`,
              email: `sim.${newRole}@escola.edu.br`,
              role: newRole,
              points: newRole === 'student' ? 100 : undefined,
              grade: newRole === 'student' ? '3º Ano B' : undefined,
              avatarUrl: `https://api.dicebear.com/7.x/initials/svg?seed=${newRole}`
            };
            setCurrentUser(fallback);
          }
          if (newRole === 'admin') {
            setActiveTab('school-stats');
          } else {
            setActiveTab('rooms');
          }
        };

        if (!currentUser) {
          return (
            <LoginScreen 
              onLoginSuccess={handleLoginSuccess} 
              onJoinAsVisitor={handleJoinAsVisitor}
              targetRoomId="r1"
            />
          );
        }

        if (activeRoomCall) {
          return (
            <VirtualRoom 
              room={activeRoomCall} 
              currentUser={currentUser} 
              onLeave={() => setActiveRoomCall(null)} 
            />
          );
        }

        return (
          <div className="flex bg-slate-50 min-h-screen text-slate-800" id="main-shell">
            <Sidebar 
              currentUser={currentUser} 
              activeTab={activeTab} 
              setActiveTab={setActiveTab} 
              onLogout={() => setCurrentUser(null)}
              onChangeRole={handleRoleSwitch}
              onTriggerOnboarding={() => setShowOnboarding(true)}
            />

            <main className="flex-1 h-screen overflow-y-auto bg-slate-50/50">
              {activeTab === 'rooms' && (
                <RoomsSelector onStartCall={room => setActiveRoomCall(room)} currentUser={currentUser} />
              )}
              {activeTab === 'gamification' && (
                <GamificationCenter currentUser={currentUser} onUpdateUser={setCurrentUser} />
              )}
              {activeTab === 'portfolios' && (
                <PortfolioFeed currentUser={currentUser} />
              )}
              {activeTab === 'calendar' && (
                <CalendarTab />
              )}
              {activeTab === 'messages' && (
                <ConversasTab currentUser={currentUser} />
              )}
              {activeTab === 'directory' && (
                <DiretorioTab currentUser={currentUser} />
              )}
              {['school-stats', 'presence-logs', 'audit-logs'].includes(activeTab) && (
                <AdminDashboard currentUser={currentUser} activeTab={activeTab} />
              )}
            </main>

            {showOnboarding && (
              <OnboardingModal 
                currentUser={currentUser} 
                onComplete={handleOnboardingComplete} 
                onClose={() => setShowOnboarding(false)} 
              />
            )}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
